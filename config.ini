[machine]
nickname = A
# ip = 192.168.1.10   (optional: set this if auto-detection picks the wrong interface)

[timing]
# IMPORTANTE: o token dá uma volta completa em (nº de máquinas × token_delay).
# min_token_interval PRECISA ser menor que esse tempo, senão toda volta legítima
# do token é confundida com duplicata e descartada (o anel trava).
# Com token_delay=0.5 e 2 máquinas → volta ≈ 1.0s, bem acima de min_token_interval=0.5s.
token_delay = 0.5
data_delay = 0.1
token_timeout = 5.0
min_token_interval = 0.5

[faults]
error_probability = 0.1
